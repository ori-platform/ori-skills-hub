name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-dev.txt
          python -m pip install --no-deps -e .
      - name: Pre-commit
        run: SKIP=no-commit-to-branch pre-commit run --show-diff-on-failure --all-files
      - name: Tests
        run: pytest -q
      - name: Type check
        run: mypy hub
