name: "Implementation Issue"
description: "Implementation task from the Ori Skills Hub Implementation Reference"
title: "[HUB-NNN] "
labels: []
body:
  - type: markdown
    attributes:
      value: |
        > Every issue must have clear acceptance criteria, explicit dependencies, and enough context
        > that a contributor who has never seen the codebase can deliver against it.
        > Keep this issue scoped to the repository contract below.


  - type: textarea
    id: context
    attributes:
      label: Context
      description: "Why this work exists. Link to the implementation reference section and the architectural purpose."
      placeholder: |
        One paragraph. A contributor who reads only this should understand the "why."
    validations:
      required: true

  - type: textarea
    id: scope
    attributes:
      label: Scope
      description: "What this issue delivers. Be specific about files, packages, and interfaces."
      placeholder: |
        - [ ] Python module under `hub/` to create or modify
        - [ ] FastAPI route, storage adapter, signing helper, or validation rule
        - [ ] Database model/migration if persistence-facing
        - [ ] Tests under `tests/`
    validations:
      required: true

  - type: textarea
    id: non-goals
    attributes:
      label: Non-Goals
      description: "What this issue explicitly does NOT do. Prevents scope creep."
      placeholder: |
        - This issue does not implement unrelated repo work.
        - This issue does not change cross-repo contracts unless explicitly labelled contract-change.
    validations:
      required: true

  - type: textarea
    id: technical-spec
    attributes:
      label: Technical Specification
      description: "Code signatures, data types, algorithms, error handling. Enough detail to implement without guessing."
      placeholder: |
        ```python
        from fastapi import APIRouter

        router = APIRouter()

        @router.post("/api/skills/publish")
        async def publish_skill() -> dict[str, object]:
            ...
        ```
    validations:
      required: true

  - type: textarea
    id: acceptance-criteria
    attributes:
      label: Acceptance Criteria
      description: "Checkboxes. Every one must be checked before the PR is merged."
      placeholder: |
        - [ ] Security-sensitive paths fail closed
        - [ ] Hub never executes skill hook code
        - [ ] `pytest` passes
        - [ ] `mypy` strict passes
        - [ ] `ruff check` and `ruff format --check` pass
        - [ ] Tests cover accepted and rejected paths
    validations:
      required: true

  - type: textarea
    id: tests
    attributes:
      label: Tests Required
      description: "Specific test names and what each verifies."
      placeholder: |
        | Test | Verifies |
        |------|----------|
        | `test_<feature>_happy_path` | Expected API/storage/signing behavior |
        | `test_<feature>_rejects_invalid_input` | Fail-closed behavior |
        | `test_<feature>_does_not_execute_hooks` | Hub safety boundary, when relevant |
    validations:
      required: true

  - type: textarea
    id: invariants
    attributes:
      label: "Invariants — Do Not Violate"
      description: "Copy the specific AGENTS.md invariants that apply to this issue."
      placeholder: |
        - **HUB-1**: Verify before storage.
        - **HUB-3**: Tier C/D skills require review.
        - **HUB-8**: The Hub must never execute skill hooks.
        - Hub root Ed25519 signing uses `cryptography` for runtime interoperability.
    validations:
      required: true

  - type: textarea
    id: dependencies
    attributes:
      label: Dependencies
      description: "What blocks this issue and what it unblocks."
      placeholder: |
        **Blocked by:**
        - #NN — short title

        **Unblocks:**
        - #MM — short title
    validations:
      required: true

  - type: textarea
    id: references
    attributes:
      label: Contract References
      description: "Links to specs, implementation references, runtime code, or SDK contract files relevant to this repo."
      placeholder: |
        - `ori-specs/skill-package/v1.md` — skill package schema
        - `ori-specs/signing/v1.md` — Ed25519 signing contract
        - Skills Hub Implementation Reference section for this issue
        - Runtime `ori/skills/loader.py` and `ori/skills/signing.py` when mirroring validation/signing
    validations:
      required: false

  - type: dropdown
    id: priority
    attributes:
      label: Priority
      options:
        - "poc-critical"
        - "post-poc"
    validations:
      required: true

  - type: checkboxes
    id: labels-check
    attributes:
      label: Additional Labels
      options:
        - label: "contract-change — modifies cross-repo contract"
        - label: "runtime-impact — requires follow-up PR in ori-runtime"
        - label: "security-sensitive — touches signing, tokens, keypairs, Tier C/D, or device credentials"
